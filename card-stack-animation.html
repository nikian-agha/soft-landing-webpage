<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Card Stack Scroll Animation</title>
<style>
/* =============================================================
   Soft Landing — Colors & Type Tokens (inlined)
   ============================================================= */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

:root {
  --sl-yellow:        #F9C515;
  --sl-yellow-hover:  #E6B014;
  --sl-yellow-soft:   #FFE9B5;
  --sl-yellow-dot:    #FFC23B;
  --sl-coral:         #D6594D;
  --sl-coral-soft:    #F9DAD5;
  --sl-cream:         #FFFBF3;
  --sl-ink:           #2D424D;
  --sl-sunrise-1:     #FFB54D;
  --sl-sunrise-2:     #FFA8DB;
  --sl-sunrise-3:     #CCCFF2;
  --sl-white:         #FFFFFF;
  --sl-gray-50:       #F9FAFB;
  --sl-gray-100:      #F3F4F6;
  --sl-gray-150:      #F6F6F6;
  --sl-gray-200:      #E5E7EB;
  --sl-gray-300:      #D1D5DB;
  --sl-gray-400:      #9CA3AF;
  --sl-gray-500:      #6B7280;
  --sl-gray-600:      #4B5563;
  --sl-gray-700:      #374151;
  --sl-gray-900:      #0F1115;
  --sl-black:         #000000;
  --sl-bg:            var(--sl-gray-50);
  --sl-surface:       #FFFFFF;
  --sl-fg:            var(--sl-gray-900);
  --sl-fg-1:          #111827;
  --sl-fg-2:          #4B5563;
  --sl-fg-3:          #9CA3AF;
  --sl-border:        #E5E7EB;
  --sl-border-strong: #D1D5DB;
  --sl-font-sans: 'Inter', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  --sl-shadow-md:  0 4px 20px rgba(0,0,0,0.08);
  --sl-shadow-lg:  0 8px 30px rgba(0,0,0,0.12);
}

/* =============================================================
   Animation
   ============================================================= */
:root {
  --sl-bg: #F9FAFB;
  --sl-ink: #2D424D;
  --sl-gray-400: #9CA3AF;
  --sl-gray-500: #6B7280;
  --ss: 4;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--sl-bg);
  font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  -webkit-font-smoothing: antialiased;
}

.track { height: 300vh; }

.viewport {
  position: fixed;
  inset: 0;
  overflow: hidden;
  perspective: 2200px;
  display: flex;
  align-items: center;
  justify-content: center;
  background-color: var(--sl-bg);
  background-image: radial-gradient(rgba(45,66,77,0.10) 1px, transparent 1px);
  background-size: 16px 16px;
}

.plane {
  position: relative;
  width: 0;
  height: 0;
  transform-style: preserve-3d;
}

.card {
  position: absolute;
  left: 0;
  top: 0;
  width: calc(152px * var(--ss));
  height: calc(106px * var(--ss));
  margin-left: calc(-76px * var(--ss));
  margin-top: calc(-53px * var(--ss));
  border-radius: calc(13px * var(--ss));
  box-shadow: 0 calc(8px * var(--ss)) calc(20px * var(--ss)) rgba(45,66,77,0.10), 0 calc(1px * var(--ss)) calc(3px * var(--ss)) rgba(45,66,77,0.07);
  overflow: hidden;
  border: calc(1px * var(--ss)) solid var(--sl-gray-500, #6B7280);
}

.card .photo {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: none;
}
.card.has-photo .photo { display: block; }
.card .photo.before { opacity: 1; }
.card .photo.after  { opacity: 0; }

.hint {
  position: fixed;
  left: 50%;
  bottom: 34px;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  color: var(--sl-gray-500);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.01em;
  pointer-events: none;
  z-index: 500;
}
.hint svg { width: 22px; height: 22px; animation: nudge 1.8s ease-in-out infinite; }
@keyframes nudge {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(5px); }
}
@media (prefers-reduced-motion: reduce) {
  .hint svg { animation: none; }
}
</style>
</head>
<body>
  <div class="track"></div>

  <div class="viewport">
    <div class="plane" id="plane"></div>
  </div>

  <div class="hint" id="hint">
    <span>Scroll</span>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6 9l6 6 6-6" />
    </svg>
  </div>

<script>
(function () {
  const plane = document.getElementById('plane');
  const hint  = document.getElementById('hint');

  const palette = [
    '#F9C515', '#E6B014', '#FFE9B5',
    '#D6594D', '#E07F74',
    '#2D424D', '#3E5A66', '#557080',
    '#CCCFF2', '#A8AEE8', '#8E95DE',
    '#FFB54D', '#FFA8DB',
    '#FFFBF3', '#EEE4CF',
    '#6B7B85'
  ];

  const CARD_HTML     = '<img class="photo" alt="">';
  const FEATURED_HTML = '<img class="photo before" alt=""><img class="photo after" alt="">';
  const PHOTO_KEY     = 'cardStackPhotos';

  // ---- locked tweak values ----
  const CFG = {
    cols:      7,
    rows:      8,
    tilt:      43,
    pan:       0,
    twist:     -18,
    startZoom: 0.95,
    offsetX:   10,
    offsetY:   -200,
    lens:      2200,
    gapX:      1.05,
    gapY:      0.85,
    scatter:   1.8,
    zoom:      3.55,
    visible:   3,
    trackVh:   300,
  };

  const SS           = 4;
  const BASE_COL_GAP = 168 * SS;
  const BASE_ROW_GAP = 150 * SS;
  let   COL_GAP      = BASE_COL_GAP * CFG.gapX;
  let   ROW_GAP      = BASE_ROW_GAP * CFG.gapY;

  const rand   = (a, b)    => a + Math.random() * (b - a);
  const lerp   = (a, b, t) => a + (b - a) * t;
  const clamp  = (v, lo, hi) => Math.min(hi, Math.max(lo, v));
  const smooth = (t)       => t * t * (3 - 2 * t);

  let cards = [];

  function build() {
    plane.innerHTML = '';
    cards = [];
    const COLS = CFG.cols, ROWS = CFG.rows, COUNT = COLS * ROWS;

    const featuredIdx = Math.floor(ROWS / 2) * COLS + Math.floor(COLS / 2);
    const others = [];
    for (let i = 0; i < COUNT; i++) if (i !== featuredIdx) others.push(i);
    for (let i = others.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [others[i], others[j]] = [others[j], others[i]];
    }
    const depthByIdx = new Array(COUNT);
    depthByIdx[featuredIdx] = 0;
    others.forEach((ix, k) => { depthByIdx[ix] = k + 1; });

    let idx = 0;
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const featured = idx === featuredIdx;
        const depth    = depthByIdx[idx];
        const el       = document.createElement('div');
        el.className   = 'card' + (featured ? ' featured' : '');
        el.style.background = palette[idx % palette.length];
        el.innerHTML   = featured ? FEATURED_HTML : CARD_HTML;
        const s = CFG.scatter;
        cards.push({
          el, depth, featured,
          slot: featured ? -1 : depth - 1,
          gx:   (c - (COLS - 1) / 2) * COL_GAP,
          gy:   (r - (ROWS - 1) / 2) * ROW_GAP,
          sx:   featured ? 0 : (depth * rand(-0.7,  0.7) + rand(-10, 10)) * s * SS,
          sy:   featured ? 0 : (-depth * 1.5 + rand(-7, 7) * s) * SS,
          srot: featured ? 0 : rand(-5, 5) * s,
          delay: featured ? 0.05 : Math.random() * 0.42,
        });
        el.style.zIndex = String(600 - depth);
        plane.appendChild(el);
        idx++;
      }
    }
    applyPhotos();
    computeFit();
  }

  function getPhotos() {
    try { return JSON.parse(localStorage.getItem(PHOTO_KEY)) || {}; } catch (e) { return {}; }
  }

  function applyPhotos() {
    const data = getPhotos();
    const lib  = Array.isArray(data.library) ? data.library : [];
    const front = data.front || {};
    for (const cd of cards) {
      if (cd.featured) {
        const before = front.before || '';
        const after  = front.after  || front.before || '';
        cd.beforeEl  = cd.el.querySelector('.photo.before');
        cd.afterEl   = cd.el.querySelector('.photo.after');
        if (before) {
          cd.beforeEl.src = before; cd.afterEl.src = after;
          cd.el.classList.add('has-photo');
        } else {
          cd.beforeEl.removeAttribute('src'); cd.afterEl.removeAttribute('src');
          cd.el.classList.remove('has-photo');
        }
      } else {
        const img = cd.el.querySelector('.photo');
        const url = lib[cd.slot];
        if (url) { img.src = url; cd.el.classList.add('has-photo'); }
        else { img.removeAttribute('src'); cd.el.classList.remove('has-photo'); }
      }
    }
  }

  function render(P) {
    const e  = smooth(clamp(P / 0.85, 0, 1));
    const rx = lerp(CFG.tilt, 0, e);
    const ry = lerp(CFG.pan,  0, e);
    const rz = lerp(CFG.twist, 0, e);
    const ps = fit * lerp(CFG.startZoom, 1, e);
    const tx = lerp(CFG.offsetX, 0, e);
    const ty = lerp(CFG.offsetY, 0, e);
    plane.style.transform =
      `translate(${tx}px, ${ty}px) scale(${ps}) rotateX(${rx}deg) rotateY(${ry}deg) rotateZ(${rz}deg)`;

    for (const cd of cards) {
      const pi  = smooth(clamp((P - cd.delay) / 0.55, 0, 1));
      const x   = lerp(cd.gx, cd.sx, pi);
      const y   = lerp(cd.gy, cd.sy, pi);
      const rot = lerp(0, cd.srot, pi);
      const sc  = lerp(1, CFG.zoom, pi);
      cd.el.style.transform =
        `translate3d(${x}px, ${y}px, 0) rotateZ(${rot}deg) scale(${sc})`;
      cd.el.style.opacity = cd.depth < CFG.visible ? '1' : String(1 - pi);
      if (cd.featured && cd.beforeEl) {
        const ba = smooth(clamp((P - 0.4) / 0.5, 0, 1));
        cd.beforeEl.style.opacity = String(1 - ba);
        cd.afterEl.style.opacity  = String(ba);
      }
    }

    hint.style.opacity = String(clamp(1 - P / 0.04, 0, 1));
  }

  let fit = 1;
  function computeFit() {
    const gw = CFG.cols * BASE_COL_GAP;
    fit = Math.min(
      1,
      (window.innerWidth  - 80) / gw,
      (window.innerHeight - 40) / (CFG.rows * BASE_ROW_GAP * 0.6)
    );
  }

  let targetP = 0, curP = 0;
  function scrollProgress() {
    const max = document.documentElement.scrollHeight - window.innerHeight;
    return max > 0 ? clamp(window.scrollY / max, 0, 1) : 0;
  }
  function onScroll() {
    targetP = scrollProgress();
    try { localStorage.setItem('cardStackScroll', String(window.scrollY)); } catch (e) {}
  }
  function loop() {
    curP += (targetP - curP) * 0.12;
    if (Math.abs(targetP - curP) < 0.0002) curP = targetP;
    render(curP);
    requestAnimationFrame(loop);
  }

  window.addEventListener('resize', () => { computeFit(); render(curP); });
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('storage', (e) => { if (e.key === PHOTO_KEY) applyPhotos(); });
  window.addEventListener('focus', applyPhotos);

  document.querySelector('.track').style.height = CFG.trackVh + 'vh';
  document.querySelector('.viewport').style.perspective = CFG.lens + 'px';

  build();

  try {
    const saved = parseFloat(localStorage.getItem('cardStackScroll'));
    if (!isNaN(saved)) window.scrollTo(0, saved);
  } catch (e) {}

  targetP = curP = scrollProgress();
  render(curP);
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
